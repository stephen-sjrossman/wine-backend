syntax = "proto3";

package wine.v1.geography;
option go_package = "github.com/stephen-sjrossman/wine-backend/api/wine/v1/geography;winev1geography";
option java_package = "com.sjrossman.wine.v1.geography";
option java_multiple_files = true;
option java_outer_classname = "AppellationPb";
option swift_prefix = "WineV1Geography";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// Represents a geographical winemaking appellation.
message Appellation {
  // UUID uniquely identifying an Appellation.
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  oneof container {
    option (buf.validate.oneof).required = true;

    // UUID of the Country to which the Appellation belongs.
    string country_id = 2 [(buf.validate.field).string.uuid = true];

    // UUID of the Region to which the Appellation belongs.
    string region_id = 3 [(buf.validate.field).string.uuid = true];

    // UUID of the Subregion to which the Appellation belongs.
    string subregion_id = 4 [(buf.validate.field).string.uuid = true];
  }

  // Human-readable name of the Appellation.
  string name = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 255
  ];

  // Timestamp at which the Appellation was created.
  google.protobuf.Timestamp created_at = 101 [
    (buf.validate.field).required = true,
    (buf.validate.field).timestamp.gte = {seconds: 1767225600} // Jan 1, 2026
  ];

  // Timestamp at which the Appellation was last updated.
  google.protobuf.Timestamp updated_at = 102 [
    (buf.validate.field).required = true,
    (buf.validate.field).timestamp.gte = {seconds: 1767225600} // Jan 1, 2026
  ];
}
