syntax = "proto3";

package wine.v1.geography;
option go_package = "github.com/stephen-sjrossman/wine-backend/api/wine/v1/geography;winev1geography";
option java_package = "com.sjrossman.wine.v1.geography";
option java_multiple_files = true;
option java_outer_classname = "RegionPb";
option swift_prefix = "WineV1Geography";

import "google/protobuf/timestamp.proto";

// Represents a geographical winemaking region.
message Region {
  // UUID uniquely identifying a Region.
  string id = 1;

  // UUID of the Country to which the Region belongs.
  string country_id = 2;

  // Human-readable name of the Region.
  string name = 3;

  // Timestamp at which the Region was created.
  google.protobuf.Timestamp created_at = 101;

  // Timestamp at which the Region was last updated.
  google.protobuf.Timestamp updated_at = 102;
}
