syntax = "proto3";

package wine.v1.geography;
option go_package = "github.com/stephen-sjrossman/wine-backend/api/wine/v1/geography;winev1geography";
option java_package = "com.sjrossman.wine.v1.geography";
option java_multiple_files = true;
option java_outer_classname = "ContinentPb";
option swift_prefix = "WineV1Geography";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// Represents a geographical winemaking continent.
message Continent {
  // UUID uniquely identifying a Continent.
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];

  // Human-readable name of the Continent.
  string name = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 255
  ];

  // Timestamp at which the Continent was created.
  google.protobuf.Timestamp created_at = 101 [
    (buf.validate.field).required = true,
    (buf.validate.field).timestamp.gte = {seconds: 1767225600} // Jan 1, 2026
  ];

  // Timestamp at which the Continent was last updated.
  google.protobuf.Timestamp updated_at = 102 [
    (buf.validate.field).required = true,
    (buf.validate.field).timestamp.gte = {seconds: 1767225600} // Jan 1, 2026
  ];
}
